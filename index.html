        ]}
    };

    function init() {
        let container = document.getElementById('categories-layer');
        for (let key in categories) {
            let cat = categories[key];
            let div = document.createElement('div');
            div.className = 'card'; div.tabIndex = 0;
            div.innerHTML = `<i class="fas ${cat.i}"></i><h4>${cat.n}</h4>`;
            div.onclick = () => openCategory(key);
            container.appendChild(div);
        }
    }

    function openCategory(key) {
        document.getElementById('categories-layer').style.display = 'none';
        document.getElementById('channels-layer').style.display = 'block';
        let list = document.getElementById('channels-list');
        list.innerHTML = '';
        categories[key].links.forEach(link => {
            let div = document.createElement('div');
            div.className = 'card'; div.tabIndex = 0;
            div.innerHTML = `<i class="fas fa-play-circle"></i><h4>${link.n}</h4>`;
            div.onclick = () => playChannel(link.n, link.u);
            list.appendChild(div);
        });
    }

    function playChannel(name, url) {
        document.getElementById('player-wrapper').style.display = 'block';
        document.getElementById('playing-now').innerText = "جاري المشاهدة: " + name;

        if (hls) { hls.destroy(); }
        video.pause();
        video.src = "";
        video.load();

        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
        window.scrollTo(0,0);
    }

    function showCats() {
        document.getElementById('channels-layer').style.display = 'none';
        document.getElementById('categories-layer').style.display = 'grid';
    }

    init();
</script>
</body>
</html>
