    // تحميل الأقسام عند فتح الصفحة
    function init() {
        const catContainer = document.getElementById('categories-layer');
        catContainer.innerHTML = '';
        for (let key in categories) {
            let cat = categories[key];
            let div = document.createElement('div');
            div.className = 'card';
            div.tabIndex = 0;
            div.innerHTML = `<i class="fas ${cat.icon}"></i><h4>${cat.n}</h4>`;
            div.onclick = () => showChannels(key);
            catContainer.appendChild(div);
        }
    }

    function showChannels(key) {
        document.getElementById('categories-layer').style.display = 'none';
        document.getElementById('channels-layer').style.display = 'block';
        const list = document.getElementById('channels-list');
        list.innerHTML = '';
        categories[key].links.forEach(link => {
            let div = document.createElement('div');
            div.className = 'card';
            div.tabIndex = 0;
            div.innerHTML = `<i class="fas fa-play"></i><h4>${link.n}</h4>`;
            div.onclick = () => playChannel(link.n, link.u);
            list.appendChild(div);
        });
    }

    function showCategories() {
        document.getElementById('channels-layer').style.display = 'none';
        document.getElementById('categories-layer').style.display = 'grid';
    }

    function playChannel(name, url) {
        playerWrapper.style.display = 'block';
        mainLogo.style.display = 'none'; // إخفاء الشعار لترك مساحة للمشغل
        document.getElementById('playing-now').innerText = "جاري المشاهدة: " + name;

        if (hls) { hls.destroy(); hls = null; }
        video.pause();
        video.removeAttribute('src');
        video.load();

        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
            video.play();
        }
        window.scrollTo(0,0);
    }

    init(); // تشغيل الأقسام فوراً
