<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX VIP TV | Smart TV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; outline: none; }
        body { background: #000; color: #fff; overflow-x: hidden; }
        [tabindex]:focus { border: 5px solid #ffcc00 !important; background: #222 !important; transform: scale(1.03); }
        #player-wrapper { display: none; background: #000; border-bottom: 2px solid #333; position: sticky; top: 0; z-index: 999; }
        video { width: 100%; aspect-ratio: 16/9; background: #000; display: block; }
        .content-area { text-align: center; padding: 20px; padding-bottom: 100px; }
        .logo-img { width: 100px; height: 100px; border-radius: 15px; border: 2px solid #ffcc00; margin-bottom: 10px; }
        .main-menu, .cat-grid, .chan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-top: 20px; }
        .card { background: #1a1a1a; padding: 25px 10px; border-radius: 15px; border: 2px solid #333; cursor: pointer; text-align: center; }
        .card i { font-size: 2rem; color: #ffcc00; margin-bottom: 10px; display: block; }
        .back-btn { background: #ffcc00; color: #000; padding: 12px 30px; border-radius: 10px; cursor: pointer; margin-bottom: 15px; border: none; font-weight: bold; width: 100%; max-width: 300px; }
        .ticker { background: #ffcc00; color: #000; padding: 8px; text-align: center; font-weight: bold; font-size: 0.9rem; }
        .social-footer { margin-top: 40px; padding: 20px; border-top: 1px solid #333; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .social-btn { background: #1a1a1a; color: #fff; text-decoration: none; padding: 12px 20px; border-radius: 10px; border: 2px solid #333; display: flex; align-items: center; gap: 8px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="ticker">MAX VIP - تم تحديث مشغل باقة 🟣 ليعمل مباشرة على المتصفح</div>

<div id="player-wrapper">
    <video id="video" controls autoplay playsinline></video>
    <div id="playing-now" style="text-align:center;color:#ffcc00;padding:10px;font-weight:bold;font-size:0.9rem;"></div>
</div>

<div class="content-area">
    <img src="https://i.ibb.co/N6kq4DMs/1000045857.webp" class="logo-img">
    
    <div id="main-menu" class="main-menu">
        <div class="card" tabindex="0" onclick="openNetwork('others')"><i class="fas fa-tv"></i><h4>كافة الشبكات</h4></div>
        <div class="card" tabindex="0" onclick="openNetwork('earthlink')"><i class="fas fa-globe"></i><h4>أيرثلنك</h4></div>
        <div class="card" tabindex="0" onclick="openNetwork('giganet')"><i class="fas fa-bolt"></i><h4>غيغا نت</h4></div>
    </div>

    <div id="categories-layer" style="display:none;">
        <button class="back-btn" tabindex="0" onclick="showMain()">عودة للرئيسية</button>
        <div class="cat-grid" id="cat-container"></div>
    </div>

    <div id="channels-layer" style="display:none;">
        <button class="back-btn" tabindex="0" onclick="backToCats()">عودة للأقسام</button>
        <div class="chan-grid" id="channels-list"></div>
    </div>

    <div class="social-footer">
        <a href="https://whatsapp.com/channel/0029VbCbHZuEVccJdJIfuC1R" class="social-btn"><i class="fab fa-whatsapp"></i> واتساب</a>
        <a href="https://t.me/MAX_VIP_STORE" class="social-btn"><i class="fab fa-telegram"></i> تليجرام</a>
    </div>
</div>

<script>
    let hls = null;
    const video = document.getElementById('video');
    var currentNet = '';

    const networks = {
        others: {
            cats: {
                bein: { n: "beIN Sports", links: [
                    {n:"BN1 🇮🇶", u:"https://stream.supertv.gg:3001/supertv/sport/stv1/ch1/adaptive.m3u8"},
                    {n:"BN2 🇮🇶", u:"https://stream.supertv.gg:3001/supertv/sport/stv1/ch2/ch2_1080.m3u8"},
                    {n:"BN3 🇮🇶", u:"https://stream.supertv.gg:3001/supertv/sport/stv1/ch3/ch3_1080.m3u8"},
                    {n:"MAXVIP", u:"https://stream.supertv.gg:3001/supertv/sport/stv1/ch8/ch8_1080.m3u8"},
                    {n:"BN SPORT NEWS", u:"https://tv.vodu.me:1995/live/beinsport-news/playlist.m3u8"}
                ]},
                purple: { n: "beIN Purple", links: [
                    {n:"BN1 S🟣", u:"http://yddfknmd.vip:2082/live/YDDMDFKN_972151/J11rmEOm/1.m3u8"},
                    {n:"BN2 S🟣", u:"http://yddfknmd.vip:2082/live/YDDMDFKN_972151/J11rmEOm/272467.m3u8"},
                    {n:"BN3 S🟣", u:"http://yddfknmd.vip:2082/live/YDDMDFKN_972151/J11rmEOm/272465.m3u8"},
                    {n:"BN4 S🟣", u:"http://yddfknmd.vip:2082/live/YDDMDFKN_972151/J11rmEOm/272464.m3u8"},
                    {n:"BN5 S🟣", u:"http://yddfknmd.vip:2082/live/YDDMDFKN_972151/J11rmEOm/272463.m3u8"},
                    {n:"BN6 S🟣", u:"http://yddfknmd.vip:2082/live/YDDMDFKN_972151/J11rmEOm/272462.m3u8"},
                    {n:"BN7 S🟣", u:"http://yddfknmd.vip:2082/live/YDDMDFKN_972151/J11rmEOm/272461.m3u8"},
                    {n:"BN8 S🟣", u:"http://yddfknmd.vip:2082/live/YDDMDFKN_972151/J11rmEOm/272460.m3u8"},
                    {n:"BN9 S🟣", u:"http://yddfknmd.vip:2082/live/YDDMDFKN_972151/J11rmEOm/272459.m3u8"}
                ]},
                iraq: { n: "قنوات عراقية", links: [
                    {n:"MBC IRAQ", u:"https://shd-gcp-live.edgenextcdn.net/live/bitmovin-mbc-iraq/e38c44b1b43474e1c39cb5b90203691e/index.m3u8"},
                    {n:"UTV", u:"https://mn-nl.mncdn.com/utviraqi2/64c80359/index.m3u8"}
                ]}
            }
        },
        earthlink: { cats: {} },
        giganet: { cats: {} }
    };

    function playChannel(name, url) {
        document.getElementById('player-wrapper').style.display = 'block';
        document.getElementById('playing-now').innerText = "جاري المشاهدة: " + name;

        // تنظيف المشغل تماماً
        if (hls) { hls.destroy(); hls = null; }
        video.pause();
        video.removeAttribute('src');
        video.load();

        // استخدام المشغل الذكي Hls.js لروابط 🟣 والروابط المعقدة
        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
        window.scrollTo(0,0);
    }

    function openNetwork(id) {
        currentNet = id;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('categories-layer').style.display = 'block';
        let container = document.getElementById('cat-container');
        container.innerHTML = '';
        for (let key in networks[id].cats) {
            let cat = networks[id].cats[key];
            let div = document.createElement('div');
            div.className = 'card'; div.tabIndex = 0;
            div.innerHTML = `<i class="fas fa-folder"></i><h4>${cat.n}</h4>`;
            div.onclick = () => openCategory(key);
            container.appendChild(div);
        }
    }

    function openCategory(catKey) {
        document.getElementById('categories-layer').style.display = 'none';
        document.getElementById('channels-layer').style.display = 'block';
        let list = document.getElementById('channels-list');
        list.innerHTML = '';
        networks[currentNet].cats[catKey].links.forEach(link => {
            let div = document.createElement('div');
            div.className = 'card'; div.tabIndex = 0;
            div.innerHTML = `<i class="fas fa-play-circle"></i><h4>${link.n}</h4>`;
            div.onclick = () => playChannel(link.n, link.u);
            list.appendChild(div);
        });
    }

    function showMain() {
        document.getElementById('categories-layer').style.display = 'none';
        document.getElementById('main-menu').style.display = 'grid';
    }

    function backToCats() {
        document.getElementById('channels-layer').style.display = 'none';
        document.getElementById('categories-layer').style.display = 'block';
    }
</script>
</body>
</html>
