<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX VIP TV | Smart TV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; outline: none; }
        body { background: #000; color: #fff; overflow-x: hidden; }
        [tabindex]:focus { border: 5px solid #ffcc00 !important; background: #222 !important; transform: scale(1.03); }
        #player-wrapper { display: none; background: #000; border-bottom: 2px solid #333; }
        video { width: 100%; aspect-ratio: 16/9; background: #000; display: block; }
        .quality-selector { background: #111; padding: 10px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .q-btn { background: #333; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        .content-area { text-align: center; padding: 20px; }
        .logo-img { width: 100px; height: 100px; border-radius: 15px; border: 2px solid #ffcc00; margin-bottom: 10px; }
        .main-menu, .cat-grid, .chan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #1a1a1a; padding: 25px 10px; border-radius: 15px; border: 2px solid #333; cursor: pointer; text-align: center; transition: 0.1s; }
        .card i { font-size: 2rem; color: #ffcc00; margin-bottom: 10px; display: block; }
        .back-btn { background: #ffcc00; color: #000; padding: 12px 30px; border-radius: 10px; cursor: pointer; margin-bottom: 15px; border: none; font-weight: bold; font-size: 1.1rem; }
        .ticker { background: #ffcc00; color: #000; padding: 8px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="ticker">MAX VIP STORE - أفضل تجربة مشاهدة مباشرة</div>

<div id="player-wrapper">
    <video id="video" controls autoplay playsinline preload="auto"></video>
    <div class="quality-selector" id="quality-area" style="display:none;">
        <button class="q-btn" tabindex="0" onclick="changeQuality('adaptive')">تلقائي</button>
        <button class="q-btn" tabindex="0" onclick="changeQuality('1080')">1080p</button>
        <button class="q-btn" tabindex="0" onclick="changeQuality('720')">720p</button>
        <button class="q-btn" tabindex="0" onclick="changeQuality('480')">480p</button>
    </div>
    <div id="playing-now" style="text-align:center;color:#ffcc00;padding:10px;font-weight:bold;"></div>
</div>

<div class="content-area">
    <img src="https://i.ibb.co/N6kq4DMs/1000045857.webp" class="logo-img">
    <div id="main-menu" class="main-menu">
        <div class="card" tabindex="0" onclick="openNetwork('others')"><i class="fas fa-tv"></i><h4>كافة الشبكات</h4></div>
        <div class="card" tabindex="0" onclick="openNetwork('earthlink')"><i class="fas fa-globe"></i><h4>أيرثلنك</h4></div>
        <div class="card" tabindex="0" onclick="openNetwork('giganet')"><i class="fas fa-bolt"></i><h4>غيغا نت</h4></div>
    </div>

    <div id="categories-layer" style="display:none;">
        <button class="back-btn" tabindex="0" onclick="showMain()">عودة للرئيسية</button>
        <div class="cat-grid" id="cat-container"></div>
    </div>

    <div id="channels-layer" style="display:none;">
        <button class="back-btn" tabindex="0" onclick="backToCats()">عودة للأقسام</button>
        <div class="chan-grid" id="channels-list"></div>
    </div>
</div>

<script>
    var video = document.getElementById('video');
    var currentBaseUrl = '';
    var currentChannelName = '';
    var currentNet = '';

    const networks = {
        others: {
            cats: {
                bein: { n: "beIN Sports", links: [
                    {n:"BN1 🇮🇶", u:"https://stream.supertv.gg:3001/supertv/sport/stv1/ch1/ch1_1080.m3u8"},
                    {n:"BN2 🇮🇶", u:"https://stream.supertv.gg:3001/supertv/sport/stv1/ch2/ch2_1080.m3u8"},
                    {n:"BN3 🇮🇶", u:"https://stream.supertv.gg:3001/supertv/sport/stv1/ch3/ch3_1080.m3u8"},
                    {n:"BN4 🇮🇶", u:"https://stream.supertv.gg:3001/supertv/sport/stv1/ch4/ch4_1080.m3u8"},
                    {n:"BN5 🇮🇶", u:"https://stream.supertv.gg:3001/supertv/sport/stv1/ch5/ch5_1080.m3u8"},
                    {n:"BN6 🇮🇶", u:"https://stream.supertv.gg:3001/supertv/sport/stv1/ch6/ch6_1080.m3u8"},
                    {n:"BN7 🇮🇶", u:"https://stream.supertv.gg:3001/supertv/sport/stv1/ch7/ch7_1080.m3u8"},
                    {n:"MAXVIP", u:"https://stream.supertv.gg:3001/supertv/sport/stv1/ch8/ch8_1080.m3u8"},
                    {n:"BN9", u:"https://stream.supertv.gg:3001/supertv/sport/stv1/ch9/ch9_1080.m3u8"},
                    {n:"STARZPLAY", u:"https://stream.supertv.gg:3001/supertv/sport/stv1/ch10/ch10_1080.m3u8"}
                ]},
                alkass: { n: "قنوات الكاس", links: [
                    {n:"الكاس 1", u:"https://liveeu-gcp.alkassdigital.net/alkass1-p/main.m3u8"},
                    {n:"الكاس 2", u:"https://liveeu-gcp.alkassdigital.net/alkass2-p/main.m3u8"},
                    {n:"الكاس 3", u:"https://liveeu-gcp.alkassdigital.net/alkass3-p/main.m3u8"},
                    {n:"الكاس 4", u:"https://liveeu-gcp.alkassdigital.net/alkass4-p/main.m3u8"},
                    {n:"الكاس 5", u:"https://liveeu-gcp.alkassdigital.net/alkass5-p/main.m3u8"},
                    {n:"الكاس 6", u:"https://liveeu-gcp.alkassdigital.net/alkass6-p/main.m3u8"},
                    {n:"الكاس 7", u:"https://liveeu-gcp.alkassdigital.net/alkass7-p/main.m3u8"}
                ]},
                news: { n: "الأخبار والمنوعات", links: [
                    {n:"الجزيزة الاخبارية", u:"https://live-hls-apps-aja-fa.getaj.net/AJA/index.m3u8"},
                    {n:"قناة العربي", u:"https://live.kwikmotion.com/alaraby1live/alaraby_abr/playlist.m3u8"},
                    {n:"قناة العربي 2", u:"https://live.kwikmotion.com/alaraby2live/alaraby2.smil/playlist.m3u8"},
                    {n:"الشرقية", u:"https://5d94523502c2d.streamlock.net/home/mystream/playlist.m3u8"},
                    {n:"الشرقية نيوز", u:"https://5d94523502c2d.streamlock.net/alsharqiyalive/mystream/playlist.m3u8"},
                    {n:"الرشيد", u:"https://media1.livaat.com/static/AL-RASHEED-HD/playlist.m3u8"},
                    {n:"MBC IRAQ", u:"https://shd-gcp-live.edgenextcdn.net/live/bitmovin-mbc-iraq/e38c44b1b43474e1c39cb5b90203691e/index.m3u8"},
                    {n:"UTV", u:"https://mn-nl.mncdn.com/utviraqi2/64c80359/index.m3u8"},
                    {n:"I NEWS", u:"https://live.i-news.tv/hls/stream.m3u8"},
                    {n:"عراق المستقبل", u:"https://viewmedia7219.bozztv.com/wmedia/viewmedia100/web_040/Stream/playlist.m3u8"},
                    {n:"BBC AR", u:"https://vs-hls-pushb-ww-live.akamaized.net/x=4/i=urn:bbc:pips:service:bbc_arabic_tv/mobile_wifi_main_hd_abr_v2.m3u8"}
                ]},
                kids: { n: "الأطفال والدينية", links: [
                    {n:"قناة الاطفال 1", u:"https://5dcabf026b188.streamlock.net/afarinTV/livestream/playlist.m3u8"},
                    {n:"الجوادين", u:"https://live.aljawadain.org/live/aljawadaintv/playlist.m3u8"},
                    {n:"كربلاء القرآن", u:"https://ktvlive.online/stream/hls/ch1.m3u8"},
                    {n:"المرجعية", u:"https://livefa.marjaeyattv.com/mtv_ar/playlist.m3u8"}
                ]},
                turkish: { n: "قنوات تركية", links: [
                    {n:"BN SPORT TR", u:"https://hlsssssss.ercansov.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-1.m3u8"},
                    {n:"BEIN SPORTS TR 2", u:"https://hlsssssss.ercansov.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-2.m3u8"},
                    {n:"BEIN SPORTS TR 3", u:"https://hlsssssss.ercansov.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-3.m3u8"}
                ]}
            }
        },
        earthlink: {
            cats: {
                sports: { n: "الرياضة", links: [
                    {n:"IRAQIA SPORT", u:"https://stream.veo.buzz:6073/sport/ch1/adaptive.m3u8"},
                    {n:"AL-RABAA", u:"https://stream.veo.buzz:6073/sport/ch2/adaptive.m3u8"}
                ]}
            }
        },
        giganet: {
            cats: {
                sports: { n: "Giga Sport", u: "http://stream.giganet.iq:6066/sport/ch", c: 17 }
            }
        }
    }

    function playStream(url, name) {
        document.getElementById('player-wrapper').style.display = 'block';
        currentChannelName = name;
        document.getElementById('playing-now').innerText = "جاري تشغيل: " + name;

        if (url.includes('supertv.gg')) {
            document.getElementById('quality-area').style.display = 'flex';
            currentBaseUrl = url.substring(0, url.lastIndexOf('/') + 1);
        } else {
            document.getElementById('quality-area').style.display = 'none';
        }

        video.pause();
        video.src = url;
        video.load();
        video.play().catch(function(e) { console.log("Play error"); });
        window.scrollTo(0, 0);
    }

    function changeQuality(q) {
        let channelId = currentBaseUrl.split('ch')[1].split('/')[0];
        let newUrl = (q === 'adaptive') ? currentBaseUrl + 'adaptive.m3u8' : currentBaseUrl + 'ch' + channelId + '_' + q + '.m3u8';
        playStream(newUrl, currentChannelName);
    }

    function openNetwork(net) {
        currentNet = net;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('categories-layer').style.display = 'block';
        const container = document.getElementById('cat-container');
        container.innerHTML = '';
        for (let key in networks[net].cats) {
            const cat = networks[net].cats[key];
            const div = document.createElement('div');
            div.className = 'card';
            div.setAttribute('tabindex', '0');
            div.innerHTML = `<i class="fas fa-folder"></i><h4>${cat.n}</h4>`;
            div.onclick = () => showChannels(key);
            container.appendChild(div);
        }
        container.querySelector('.card').focus();
    }

    function showChannels(catKey) {
        document.getElementById('categories-layer').style.display = 'none';
        document.getElementById('channels-layer').style.display = 'block';
        const list = document.getElementById('channels-list');
        list.innerHTML = '';
        const cat = networks[currentNet].cats[catKey];
        if (cat.u) {
            for (let i = 1; i <= cat.c; i++) {
                addChannelCard(cat.n + " " + i, cat.u + i + "/adaptive.m3u8");
            }
        } else {
            cat.links.forEach(link => addChannelCard(link.n, link.u));
        }
        list.querySelector('.card').focus();
    }

    function addChannelCard(name, url) {
        const div = document.createElement('div');
        div.className = 'card';
        div.setAttribute('tabindex', '0');
        div.innerHTML = `<i class="fas fa-play-circle"></i><small>${name}</small>`;
        div.onclick = () => playStream(url, name);
        document.getElementById('channels-list').appendChild(div);
    }

    function showMain() {
        document.getElementById('categories-layer').style.display = 'none';
        document.getElementById('main-menu').style.display = 'grid';
    }

    function backToCats() {
        document.getElementById('channels-layer').style.display = 'none';
        document.getElementById('categories-layer').style.display = 'block';
    }

    document.addEventListener('keydown', function(e) {
        const focusable = document.querySelectorAll('[tabindex="0"]');
        let index = Array.from(focusable).indexOf(document.activeElement);
        if (e.key === 'ArrowRight') {
            index = (index + 1) % focusable.length;
            focusable[index].focus();
        } else if (e.key === 'ArrowLeft') {
            index = (index - 1 + focusable.length) % focusable.length;
            focusable[index].focus();
        } else if (e.key === 'ArrowDown') {
            index = (index + 4) % focusable.length;
            focusable[index].focus();
        } else if (e.key === 'ArrowUp') {
            index = (index - 4 + focusable.length) % focusable.length;
            focusable[index].focus();
        } else if (e.key === 'Enter') {
            document.activeElement.click();
        }
    });
</script>
</body>
</html>
